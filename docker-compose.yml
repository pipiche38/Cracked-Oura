services:
  backend:
    build: ./backend
    volumes:
      - oura-data:/app/data
    environment:
      - DB_PATH=/app/data/oura.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  oura-data:
